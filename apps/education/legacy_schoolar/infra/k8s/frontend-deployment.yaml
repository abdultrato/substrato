apiVersion: apps/v1
kind: Deployment
metadata:
  name: schoolar-frontend
  labels:
    app: schoolar-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: schoolar-frontend
  template:
    metadata:
      labels:
        app: schoolar-frontend
    spec:
      containers:
        - name: frontend
          image: schoolar-s/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: schoolar-frontend-config
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
