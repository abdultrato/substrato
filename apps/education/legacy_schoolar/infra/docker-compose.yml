version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: schoolar
      POSTGRES_USER: schoolar
      POSTGRES_PASSWORD: schoolar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schoolar -d schoolar"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: infra/docker/backend.Dockerfile
    environment:
      USE_POSTGRES: "true"
      POSTGRES_DB: schoolar
      POSTGRES_USER: schoolar
      POSTGRES_PASSWORD: schoolar
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend
      DJANGO_DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://backend:8000
    depends_on:
      - backend
    environment:
      API_BASE_URL: http://backend:8000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
