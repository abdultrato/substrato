services:

  # =========================================================================
  # POSTGRESQL DATABASE
  # =========================================================================
  db:
    image: postgres:15-alpine
    container_name: substrato_db
    environment:
      POSTGRES_DB: substrato
      POSTGRES_USER: substrato_user
      POSTGRES_PASSWORD: dev_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5434:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U substrato_user -d substrato" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - substrato
    restart: unless-stopped

  # =========================================================================
  # REDIS - CACHE & CELERY BROKER
  # =========================================================================
  redis:
    image: redis:7-alpine
    container_name: substrato_redis
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - substrato
    restart: unless-stopped

  # =========================================================================
  # RABBITMQ - EVENT BACKBONE OPCIONAL
  # =========================================================================
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: substrato_rabbitmq
    profiles: ["messaging"]
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - substrato
    restart: unless-stopped

  # =========================================================================
  # APACHE KAFKA - STREAMS/ANALYTICS OPCIONAL
  # =========================================================================
  kafka:
    image: bitnami/kafka:3.7
    container_name: substrato_kafka
    profiles: ["analytics"]
    environment:
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/bitnami/kafka
    ports:
      - "9094:9094"
    networks:
      - substrato
    restart: unless-stopped

  # =========================================================================
  # OPENTELEMETRY COLLECTOR - OBSERVABILIDADE OPCIONAL
  # =========================================================================
  otel_collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: substrato_otel_collector
    profiles: ["observability"]
    command: ["--config=/etc/otelcol-contrib/config.yml"]
    volumes:
      - ./monitoring/otel-collector.yml:/etc/otelcol-contrib/config.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "9464:9464"
    networks:
      - substrato
    restart: unless-stopped

  # =========================================================================
  # DJANGO BACKEND
  # =========================================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: substrato_backend
    entrypoint: /app/entrypoint.sh
    command: gunicorn platform.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120 --access-logfile - --error-logfile -
    environment:
      DJANGO_ENV: development
      DJANGO_SETTINGS_MODULE: platform.settings.development
      DJANGO_DEBUG: "True"
      SKIP_MIGRATIONS: "1"

      DJANGO_SECRET_KEY: dev-insecure-key-change-in-production
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend,0.0.0.0
      # Dev: permitir que o usuário "admin" permaneça superuser (ver política em settings/base.py)
      SUBSTRATO_SUPERUSER_ALLOWLIST: admin

      DB_ENGINE: postgres
      DB_NAME: substrato
      DB_USER: substrato_user
      DB_PASSWORD: dev_password
      DB_HOST: db
      DB_PORT: "5432"

      REDIS_URL: redis://redis:6379/1
      USE_REDIS: "true"
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_WORKER_QUEUES: default,exports,billing,operations
      WAREHOUSE_EVENT_BACKBONE: "${WAREHOUSE_EVENT_BACKBONE:-local}"
      RABBITMQ_URL: "${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}"
      KAFKA_BOOTSTRAP_SERVERS: "${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}"
      WAREHOUSE_KAFKA_TOPIC_PREFIX: "${WAREHOUSE_KAFKA_TOPIC_PREFIX:-warehouse}"
      WAREHOUSE_RABBITMQ_EXCHANGE: "${WAREHOUSE_RABBITMQ_EXCHANGE:-warehouse.events}"
      OTEL_ENABLED: "${OTEL_ENABLED:-false}"
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-substrato-backend}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel_collector:4318}"
      TZ: Africa/Maputo
      SUBSTRATO_OS_RUNTIME_ENABLED: "${SUBSTRATO_OS_RUNTIME_ENABLED:-true}"
      SUBSTRATO_OS_RUNTIME_OFFLINE_ONLY: "${SUBSTRATO_OS_RUNTIME_OFFLINE_ONLY:-false}"
      SUBSTRATO_OS_OUTBOX_PATH: "${SUBSTRATO_OS_OUTBOX_PATH:-/app/substrato_os_outbox.sqlite3}"
      SUBSTRATO_OS_SYNC_BATCH_SIZE: "${SUBSTRATO_OS_SYNC_BATCH_SIZE:-500}"
      SUBSTRATO_OS_SYNC_RETRY_AFTER_SECONDS: "${SUBSTRATO_OS_SYNC_RETRY_AFTER_SECONDS:-10}"
      # Otimizações de bootstrap em dev:
      # - auto: roda collectstatic só na primeira inicialização do volume staticfiles
      # - clear=0: evita limpeza total de staticfiles a cada boot
      COLLECTSTATIC_BOOT_MODE: auto
      COLLECTSTATIC_CLEAR: "0"

    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media

    ports:
      - "8000:8000"

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - substrato
    restart: unless-stopped

  # =========================================================================
  # FRONTEND (NEXT.JS)
  # =========================================================================
  frontend:
    container_name: substrato_frontend
    image: node:20-bookworm-slim
    working_dir: /app
    environment:
      BACKEND_URL: http://backend:8000
      TZ: Africa/Maputo
      NEXT_TELEMETRY_DISABLED: "1"
      # Melhor tolerância a rede instável em ambientes dev.
      NPM_CONFIG_FETCH_RETRIES: "5"
      NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: "20000"
      NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: "120000"
      NPM_CONFIG_FETCH_TIMEOUT: "300000"
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
    command: >
      sh -lc
      "mkdir -p /home/node/.cache/next-swc /app/node_modules /app/.next;
       for d in /home/node/.cache/next-swc /app/node_modules /app/.next; do
         owner=$$(stat -c '%u:%g' $$d 2>/dev/null || true);
         if [ \"$$owner\" != '1000:1000' ]; then
           chown -R node:node $$d;
         fi;
       done;
       if [ ! -f node_modules/.bin/next ]; then
         su -s /bin/sh node -c 'npm ci --no-audit --no-fund || npm install --no-audit --no-fund';
       fi;
       exec su -s /bin/sh node -c 'npm run dev -- -H 0.0.0.0 -p 3000'"
    volumes:
      - ./frontend-next:/app
      # Mantém caches pesados em volume Linux (bem mais rápido que bind-mount no Windows)
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
      - frontend_swc_cache:/home/node/.cache/next-swc
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    networks:
      - substrato
    restart: unless-stopped

  # =========================================================================
  # WARMUP (DEV) - aquece rotas do Next para evitar timeout no 1º acesso
  # =========================================================================
  warmup:
    image: substrato-backend
    healthcheck:
      disable: true
    entrypoint:
      - sh
      - -lc
      - "set -eu; echo '[warmup] aguardando backend...'; for i in $$(seq 1 60); do if curl -fsS http://backend:8000/health/live >/dev/null 2>&1; then break; fi; sleep 1; done; echo '[warmup] aguardando frontend...'; for i in $$(seq 1 60); do if curl -fsS http://frontend:3000/login/ >/dev/null 2>&1; then break; fi; sleep 1; done; echo '[warmup] aquecendo backend...'; curl -fsS http://backend:8000/admin/login/ >/dev/null || true; echo '[warmup] aquecendo frontend (light)...'; curl -fsS http://frontend:3000/login/ >/dev/null || true; echo '[warmup] ok';"
    depends_on:
      frontend:
        condition: service_started
    networks:
      - substrato
    restart: "no"

  # =========================================================================
  # CELERY WORKER
  # =========================================================================
  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: substrato_celery
    command: celery -A platform worker -l info -Q default,exports,billing,operations --concurrency=2 --max-tasks-per-child=100
    healthcheck:
      disable: true

    environment:
      DJANGO_SETTINGS_MODULE: platform.settings.development

      DB_ENGINE: postgres
      DB_NAME: substrato
      DB_USER: substrato_user
      DB_PASSWORD: dev_password
      DB_HOST: db
      DB_PORT: "5432"

      REDIS_URL: redis://redis:6379/1
      USE_REDIS: "true"
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_WORKER_QUEUES: default,exports,billing,operations
      WAREHOUSE_EVENT_BACKBONE: "${WAREHOUSE_EVENT_BACKBONE:-local}"
      RABBITMQ_URL: "${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}"
      KAFKA_BOOTSTRAP_SERVERS: "${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}"
      WAREHOUSE_KAFKA_TOPIC_PREFIX: "${WAREHOUSE_KAFKA_TOPIC_PREFIX:-warehouse}"
      WAREHOUSE_RABBITMQ_EXCHANGE: "${WAREHOUSE_RABBITMQ_EXCHANGE:-warehouse.events}"
      OTEL_ENABLED: "${OTEL_ENABLED:-false}"
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-substrato-celery}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel_collector:4318}"
      SUBSTRATO_SUPERUSER_ALLOWLIST: admin
      TZ: Africa/Maputo
      SUBSTRATO_OS_RUNTIME_ENABLED: "${SUBSTRATO_OS_RUNTIME_ENABLED:-true}"
      SUBSTRATO_OS_RUNTIME_OFFLINE_ONLY: "${SUBSTRATO_OS_RUNTIME_OFFLINE_ONLY:-false}"
      SUBSTRATO_OS_OUTBOX_PATH: "${SUBSTRATO_OS_OUTBOX_PATH:-/app/substrato_os_outbox.sqlite3}"

    volumes:
      - .:/app

    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

    networks:
      - substrato
    restart: unless-stopped

  # =========================================================================
  # CELERY BEAT
  # =========================================================================
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: substrato_celery_beat
    command: celery -A platform beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    healthcheck:
      disable: true

    environment:
      DJANGO_SETTINGS_MODULE: platform.settings.development

      DB_ENGINE: postgres
      DB_NAME: substrato
      DB_USER: substrato_user
      DB_PASSWORD: dev_password
      DB_HOST: db
      DB_PORT: "5432"

      REDIS_URL: redis://redis:6379/1
      USE_REDIS: "true"
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CELERY_WORKER_QUEUES: default,exports,billing,operations
      WAREHOUSE_EVENT_BACKBONE: "${WAREHOUSE_EVENT_BACKBONE:-local}"
      RABBITMQ_URL: "${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}"
      KAFKA_BOOTSTRAP_SERVERS: "${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}"
      WAREHOUSE_KAFKA_TOPIC_PREFIX: "${WAREHOUSE_KAFKA_TOPIC_PREFIX:-warehouse}"
      WAREHOUSE_RABBITMQ_EXCHANGE: "${WAREHOUSE_RABBITMQ_EXCHANGE:-warehouse.events}"
      OTEL_ENABLED: "${OTEL_ENABLED:-false}"
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-substrato-celery-beat}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel_collector:4318}"
      SUBSTRATO_SUPERUSER_ALLOWLIST: admin
      TZ: Africa/Maputo
      SUBSTRATO_OS_RUNTIME_ENABLED: "${SUBSTRATO_OS_RUNTIME_ENABLED:-true}"
      SUBSTRATO_OS_RUNTIME_OFFLINE_ONLY: "${SUBSTRATO_OS_RUNTIME_OFFLINE_ONLY:-false}"
      SUBSTRATO_OS_OUTBOX_PATH: "${SUBSTRATO_OS_OUTBOX_PATH:-/app/substrato_os_outbox.sqlite3}"

    volumes:
      - .:/app

    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

    networks:
      - substrato
    restart: unless-stopped

  # =========================================================================
  # NGINX - REVERSE PROXY
  # =========================================================================
  nginx:
    image: nginx:alpine
    container_name: substrato_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    networks:
      - substrato
    restart: unless-stopped

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  kafka_data:
  static_volume:
  media_volume:
  frontend_node_modules:
  frontend_next_cache:
  frontend_swc_cache:

# ============================================================================
# NETWORK
# ============================================================================
networks:
  substrato:
    driver: bridge
