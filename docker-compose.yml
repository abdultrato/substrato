services:

  # =========================================================================
  # POSTGRESQL DATABASE
  # =========================================================================
  db:
    image: postgres:15-alpine
    container_name: substrato_db
    environment:
      POSTGRES_DB: substrato
      POSTGRES_USER: substrato_user
      POSTGRES_PASSWORD: dev_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${DB_HOST_PORT:-5433}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U substrato_user -d substrato" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - substrato
    restart: unless-stopped

  # =========================================================================
  # REDIS - CACHE & CELERY BROKER
  # =========================================================================
  redis:
    image: redis:7-alpine
    container_name: substrato_redis
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - substrato
    restart: unless-stopped

  # =========================================================================
  # DJANGO BACKEND
  # =========================================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: substrato_backend
    command: gunicorn platform.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120 --access-logfile - --error-logfile -
    environment:
      DJANGO_ENV: development
      DJANGO_SETTINGS_MODULE: platform.settings.development
      DJANGO_DEBUG: "True"

      DJANGO_SECRET_KEY: dev-insecure-key-change-in-production
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend,0.0.0.0
      # Dev: permitir que o usuário "admin" permaneça superuser (ver política em settings/base.py)
      SUBSTRATO_SUPERUSER_ALLOWLIST: admin

      DB_ENGINE: postgres
      DB_NAME: substrato
      DB_USER: substrato_user
      DB_PASSWORD: dev_password
      DB_HOST: db
      DB_PORT: "5432"

      REDIS_URL: redis://redis:6379/1
      TZ: Africa/Maputo
      # Otimizações de bootstrap em dev:
      # - auto: roda collectstatic só na primeira inicialização do volume staticfiles
      # - clear=0: evita limpeza total de staticfiles a cada boot
      COLLECTSTATIC_BOOT_MODE: auto
      COLLECTSTATIC_CLEAR: "0"

    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media

    ports:
      - "8000:8000"

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - substrato
    restart: unless-stopped

  # =========================================================================
  # FRONTEND (NEXT.JS)
  # =========================================================================
  frontend:
    container_name: substrato_frontend
    image: node:20-bookworm-slim
    working_dir: /app
    environment:
      BACKEND_URL: http://backend:8000
      TZ: Africa/Maputo
      NEXT_TELEMETRY_DISABLED: "1"
      # Melhor tolerância a rede instável em ambientes dev.
      NPM_CONFIG_FETCH_RETRIES: "5"
      NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: "20000"
      NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: "120000"
      NPM_CONFIG_FETCH_TIMEOUT: "300000"
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
    command: >
      sh -lc
      "mkdir -p /home/node/.cache/next-swc /app/node_modules /app/.next;
       for d in /home/node/.cache/next-swc /app/node_modules /app/.next; do
         owner=$$(stat -c '%u:%g' $$d 2>/dev/null || true);
         if [ \"$$owner\" != '1000:1000' ]; then
           chown -R node:node $$d;
         fi;
       done;
       if [ ! -f node_modules/.bin/next ]; then
         su -s /bin/sh node -c 'npm ci --no-audit --no-fund || npm install --no-audit --no-fund';
       fi;
       exec su -s /bin/sh node -c 'npm run dev -- -H 0.0.0.0 -p 3000'"
    volumes:
      - ./frontend-next:/app
      # Mantém caches pesados em volume Linux (bem mais rápido que bind-mount no Windows)
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
      - frontend_swc_cache:/home/node/.cache/next-swc
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    networks:
      - substrato
    restart: unless-stopped

  # =========================================================================
  # WARMUP (DEV) - aquece rotas do Next para evitar timeout no 1º acesso
  # =========================================================================
  warmup:
    image: substrato-backend
    healthcheck:
      disable: true
    entrypoint:
      - sh
      - -lc
      - "set -eu; echo '[warmup] aguardando backend...'; for i in $$(seq 1 60); do if curl -fsS http://backend:8000/health/live >/dev/null 2>&1; then break; fi; sleep 1; done; echo '[warmup] aguardando frontend...'; for i in $$(seq 1 60); do if curl -fsS http://frontend:3000/login/ >/dev/null 2>&1; then break; fi; sleep 1; done; echo '[warmup] aquecendo backend...'; curl -fsS http://backend:8000/admin/login/ >/dev/null || true; echo '[warmup] aquecendo frontend (light)...'; curl -fsS http://frontend:3000/login/ >/dev/null || true; echo '[warmup] ok';"
    depends_on:
      frontend:
        condition: service_started
    networks:
      - substrato
    restart: "no"

  # =========================================================================
  # CELERY WORKER
  # =========================================================================
  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: substrato_celery
    command: celery -A platform worker -l info --concurrency=2
    healthcheck:
      disable: true

    environment:
      DJANGO_SETTINGS_MODULE: platform.settings.development

      DB_ENGINE: postgres
      DB_NAME: substrato
      DB_USER: substrato_user
      DB_PASSWORD: dev_password
      DB_HOST: db
      DB_PORT: "5432"

      REDIS_URL: redis://redis:6379/1
      SUBSTRATO_SUPERUSER_ALLOWLIST: admin
      TZ: Africa/Maputo

    volumes:
      - .:/app

    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

    networks:
      - substrato
    restart: unless-stopped

  # =========================================================================
  # CELERY BEAT
  # =========================================================================
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: substrato_celery_beat
    command: celery -A platform beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    healthcheck:
      disable: true

    environment:
      DJANGO_SETTINGS_MODULE: platform.settings.development

      DB_ENGINE: postgres
      DB_NAME: substrato
      DB_USER: substrato_user
      DB_PASSWORD: dev_password
      DB_HOST: db
      DB_PORT: "5432"

      REDIS_URL: redis://redis:6379/1
      SUBSTRATO_SUPERUSER_ALLOWLIST: admin
      TZ: Africa/Maputo

    volumes:
      - .:/app

    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

    networks:
      - substrato
    restart: unless-stopped

  # =========================================================================
  # NGINX - REVERSE PROXY
  # =========================================================================
  nginx:
    image: nginx:alpine
    container_name: substrato_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    networks:
      - substrato
    restart: unless-stopped

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  frontend_node_modules:
  frontend_next_cache:
  frontend_swc_cache:

# ============================================================================
# NETWORK
# ============================================================================
networks:
  substrato:
    driver: bridge
