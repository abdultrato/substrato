services:

  # =========================================================================
  # POSTGRESQL DATABASE
  # =========================================================================
  db:
    image: postgres:15-alpine
    container_name: substrato_db
    environment:
      POSTGRES_DB: substrato
      POSTGRES_USER: substrato_user
      POSTGRES_PASSWORD: dev_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U substrato_user -d substrato" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - substrato
    restart: unless-stopped

  # =========================================================================
  # REDIS - CACHE & CELERY BROKER
  # =========================================================================
  redis:
    image: redis:7-alpine
    container_name: substrato_redis
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - substrato
    restart: unless-stopped

  # =========================================================================
  # DJANGO BACKEND
  # =========================================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: substrato_backend
    command: gunicorn plataforma.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120 --access-logfile - --error-logfile -
    environment:
      DJANGO_ENV: development
      DJANGO_SETTINGS_MODULE: plataforma.settings.development
      DJANGO_DEBUG: "True"

      DJANGO_SECRET_KEY: dev-insecure-key-change-in-production
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend,0.0.0.0

      DB_ENGINE: postgres
      DB_NAME: substrato
      DB_USER: substrato_user
      DB_PASSWORD: dev_password
      DB_HOST: db
      DB_PORT: "5432"

      REDIS_URL: redis://redis:6379/1
      TZ: Africa/Maputo

    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media

    ports:
      - "8000:8000"

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - substrato
    restart: unless-stopped

  # =========================================================================
  # FRONTEND (NEXT.JS)
  # =========================================================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        BACKEND_URL: http://backend:8000
    container_name: substrato_frontend
    environment:
      BACKEND_URL: http://backend:8000
      TZ: Africa/Maputo
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    networks:
      - substrato
    restart: unless-stopped

  # =========================================================================
  # CELERY WORKER
  # =========================================================================
  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: substrato_celery
    command: celery -A plataforma worker -l info --concurrency=2
    healthcheck:
      disable: true

    environment:
      DJANGO_SETTINGS_MODULE: plataforma.settings.development

      DB_ENGINE: postgres
      DB_NAME: substrato
      DB_USER: substrato_user
      DB_PASSWORD: dev_password
      DB_HOST: db
      DB_PORT: "5432"

      REDIS_URL: redis://redis:6379/1
      TZ: Africa/Maputo

    volumes:
      - .:/app

    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

    networks:
      - substrato
    restart: unless-stopped

  # =========================================================================
  # CELERY BEAT
  # =========================================================================
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: substrato_celery_beat
    command: celery -A plataforma beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    healthcheck:
      disable: true

    environment:
      DJANGO_SETTINGS_MODULE: plataforma.settings.development

      DB_ENGINE: postgres
      DB_NAME: substrato
      DB_USER: substrato_user
      DB_PASSWORD: dev_password
      DB_HOST: db
      DB_PORT: "5432"

      REDIS_URL: redis://redis:6379/1
      TZ: Africa/Maputo

    volumes:
      - .:/app

    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

    networks:
      - substrato
    restart: unless-stopped

  # =========================================================================
  # NGINX - REVERSE PROXY
  # =========================================================================
  nginx:
    image: nginx:alpine
    container_name: substrato_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - substrato
    restart: unless-stopped

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:

# ============================================================================
# NETWORK
# ============================================================================
networks:
  substrato:
    driver: bridge
