global:
  resolve_timeout: 5m

route:
  receiver: slack-warning
  group_by: ['alertname', 'tenant_id']
  group_wait: 15s
  group_interval: 2m
  repeat_interval: 1h
  routes:
    - matchers:
        - severity="critical"
      receiver: slack-critical
      repeat_interval: 15m
    - matchers:
        - severity="warning"
      receiver: slack-warning
      repeat_interval: 30m

receivers:
  - name: slack-warning
    slack_configs:
      - api_url: ${SLACK_WEBHOOK}
        channel: '#ops-alerts'
        title: "{{ .CommonAnnotations.summary }}"
        text: "{{ .CommonAnnotations.description }}\nAlert: {{ .CommonLabels.alertname }}\nTenant: {{ .CommonLabels.tenant_id }}"
        send_resolved: true

  - name: slack-critical
    slack_configs:
      - api_url: ${SLACK_WEBHOOK}
        channel: '#ops-critical'
        title: "[CRITICAL] {{ .CommonAnnotations.summary }}"
        text: "{{ .CommonAnnotations.description }}\nAlert: {{ .CommonLabels.alertname }}\nTenant: {{ .CommonLabels.tenant_id }}"
        send_resolved: true
