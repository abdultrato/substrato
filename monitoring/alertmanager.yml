global:
  resolve_timeout: 5m

route:
  receiver: slack
  group_by: ['alertname', 'tenant_id']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h

receivers:
  - name: slack
    slack_configs:
      - api_url: ${SLACK_WEBHOOK}
        channel: '#ops-alerts'
        title: "{{ .CommonAnnotations.summary }}"
        text: "{{ .CommonAnnotations.description }}\nAlert: {{ .CommonLabels.alertname }}\nTenant: {{ .CommonLabels.tenant_id }}"
        send_resolved: true
