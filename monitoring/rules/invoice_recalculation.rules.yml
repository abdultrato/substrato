groups:
  - name: recalculo-fatura
    rules:
      - alert: RecalculoFaturaDemorado
        expr: histogram_quantile(0.95, sum(rate(substrato_recalculo_invoice_duration_seconds_bucket[5m])) by (le, tenant_id)) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Recalculo de fatura lento (tenant {{ $labels.tenant_id }})"
          description: "P95 acima de 1s por pelo menos 5 minutos. Tente acompanhar a fila Celery/recalculo."

      - alert: RecalculoFaturaBurst
        expr: sum(rate(substrato_recalculo_invoice_duration_seconds_count[1m])) by (tenant_id) > 10
        for: 2m
        labels:
          severity: info
        annotations:
          summary: "Explosão de recalculos de fatura"
          description: "Média acima de 10 recalculos/minuto para o tenant {{ $labels.tenant_id }}."
