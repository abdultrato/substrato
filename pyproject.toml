[tool.ruff]
line-length = 120
target-version = "py311"
respect-gitignore = true

exclude = [
    ".git",
    "__pycache__",
    "migrations",
    "venv",
    ".venv",
    "build",
    "dist",
]

# --------------------------------------------------
# Lint rules
# --------------------------------------------------
[tool.ruff.lint]

select = [
    "E",      # pycodestyle
    "F",      # pyflakes
    "W",      # warnings
    "I",      # isort
    "UP",     # python upgrades
    "B",      # bugbear
    "SIM",    # simplifications
    "C4",     # comprehensions
    "DTZ",    # datetime timezone issues
    "T20",    # print statements
    "RET",    # return style
    "RUF",    # ruff-specific improvements
]

ignore = [
    "E501",   # line length (formatter controla)
    "RUF012", # muitos frameworks (Django/DRF) usam atributos de classe mutáveis como constantes
]

# --------------------------------------------------
# Per-file ignores
# --------------------------------------------------
[tool.ruff.lint.per-file-ignores]

"__init__.py" = ["F401"]
"settings/*.py" = ["F401"]
"migrations/*.py" = ["E501", "F401"]
"tasks/*.py" = ["B008"]  # Celery bind=True

# --------------------------------------------------
# Import sorting
# --------------------------------------------------
[tool.ruff.lint.isort]
known-first-party = [
    "apps",
    "application",
    "domain",
    "services",
    "infrastructure",
    "integrations",
    "core",
    "platform",
    "observability",
    "security",
    "system",
]
combine-as-imports = true
force-sort-within-sections = true

# --------------------------------------------------
# Formatter
# --------------------------------------------------
[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
docstring-code-format = true
