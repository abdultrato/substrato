services:

  traefik:
    image: traefik:v3.0
    command:
      - --providers.docker=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.le.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - traefik_letsencrypt:/letsencrypt
    networks:
      - web

  backend:
    image: substrato_backend:latest
    env_file:
      - .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: platform.settings.production
      DJANGO_DEBUG: "False"
      REDIS_URL: redis://redis:6379/0
      WAREHOUSE_EVENT_BACKBONE: ${WAREHOUSE_EVENT_BACKBONE:-local}
      RABBITMQ_URL: ${RABBITMQ_URL:-}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-}
      WAREHOUSE_KAFKA_TOPIC_PREFIX: ${WAREHOUSE_KAFKA_TOPIC_PREFIX:-warehouse}
      WAREHOUSE_RABBITMQ_EXCHANGE: ${WAREHOUSE_RABBITMQ_EXCHANGE:-warehouse.events}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-substrato-backend}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel_collector:4318}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=le"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
    volumes:
      - media_volume:/app/media
    depends_on:
      - db
      - redis
    networks:
      - web
      - internal

  frontend:
    image: substrato_frontend:latest
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${FRONTEND_DOMAIN}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=le"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
    networks:
      - web

  celery:
    image: substrato_backend:latest
    env_file:
      - .env.prod
    environment:
      WAREHOUSE_EVENT_BACKBONE: ${WAREHOUSE_EVENT_BACKBONE:-local}
      RABBITMQ_URL: ${RABBITMQ_URL:-}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-}
      WAREHOUSE_KAFKA_TOPIC_PREFIX: ${WAREHOUSE_KAFKA_TOPIC_PREFIX:-warehouse}
      WAREHOUSE_RABBITMQ_EXCHANGE: ${WAREHOUSE_RABBITMQ_EXCHANGE:-warehouse.events}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-substrato-celery}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel_collector:4318}
    command: celery -A platform worker -l info
    healthcheck:
      disable: true
    depends_on:
      - redis
      - db
    networks:
      - internal

  celery_beat:
    image: substrato_backend:latest
    env_file:
      - .env.prod
    environment:
      WAREHOUSE_EVENT_BACKBONE: ${WAREHOUSE_EVENT_BACKBONE:-local}
      RABBITMQ_URL: ${RABBITMQ_URL:-}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-}
      WAREHOUSE_KAFKA_TOPIC_PREFIX: ${WAREHOUSE_KAFKA_TOPIC_PREFIX:-warehouse}
      WAREHOUSE_RABBITMQ_EXCHANGE: ${WAREHOUSE_RABBITMQ_EXCHANGE:-warehouse.events}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-substrato-celery-beat}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel_collector:4318}
    command: celery -A platform beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    healthcheck:
      disable: true
    depends_on:
      - redis
      - db
    networks:
      - internal

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - internal

  rabbitmq:
    image: rabbitmq:3.13-management
    profiles: ["messaging"]
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - internal

  kafka:
    image: bitnami/kafka:3.7
    profiles: ["analytics"]
    environment:
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - internal

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  prometheus:
    image: prom/prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/rules:/etc/prometheus/rules
    networks:
      - internal

  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - ./monitoring/grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml
      - ./monitoring/grafana/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - internal

  otel_collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol-contrib/config.yml"]
    volumes:
      - ./monitoring/otel-collector.yml:/etc/otelcol-contrib/config.yml:ro
    networks:
      - internal

  alertmanager:
    image: prom/alertmanager
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--config.expand-env"
    environment:
      SLACK_WEBHOOK: ${SLACK_WEBHOOK}
    networks:
      - internal

  celery_exporter:
    image: ghcr.io/ovh/celery-exporter:latest
    environment:
      BROKER_URL: redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  kafka_data:
  traefik_letsencrypt:
  media_volume:

networks:
  web:
  internal:
