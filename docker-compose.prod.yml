# ============================================================================
# DOCKER COMPOSE - PRODUÇÃO
# ============================================================================

version: '3.9'

services:

  # =========================================================================
  # POSTGRESQL DATABASE
  # =========================================================================
  db:
    image: postgres:15-alpine
    container_name: substrato_db_prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - substrato_prod
    restart: always

  # =========================================================================
  # REDIS
  # =========================================================================
  redis:
    image: redis:7-alpine
    container_name: substrato_redis_prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-change-me}
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - substrato_prod
    restart: always

  # =========================================================================
  # DJANGO BACKEND
  # =========================================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: substrato_backend_prod
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn plataforma.wsgi:application --bind 0.0.0.0:8000 --workers 4 --worker-class sync --timeout 120 --access-logfile - --error-logfile - --statsd-host statsd:8125 --statsd-prefix substrato"
    environment:
      DJANGO_ENV: production
      DJANGO_SETTINGS_MODULE: plataforma.settings.production
      DJANGO_DEBUG: "False"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      
      # Database
      DB_ENGINE: postgres
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: db
      DB_PORT: "5432"
      
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-change-me}@redis:6379/0
      
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      
      # Security
      SECURE_SSL_REDIRECT: "True"
      SECURE_HSTS_SECONDS: "31536000"
      SECURE_HSTS_INCLUDE_SUBDOMAINS: "True"
      SECURE_HSTS_PRELOAD: "True"
      
      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      
      # Sentry (optional)
      SENTRY_DSN: ${SENTRY_DSN:-}
      
      # Email
      EMAIL_BACKEND: ${EMAIL_BACKEND}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      
      TZ: America/Sao_Paulo
    volumes:
      - static_volume_prod:/app/staticfiles
      - media_volume_prod:/app/media
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - substrato_prod
    restart: always

  # =========================================================================
  # CELERY WORKER
  # =========================================================================
  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: substrato_celery_prod
    command: celery -A plataforma worker -l info --concurrency=4
    environment:
      DJANGO_ENV: production
      DJANGO_SETTINGS_MODULE: plataforma.settings.production
      DJANGO_DEBUG: "False"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      
      # Database
      DB_ENGINE: postgres
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: db
      DB_PORT: "5432"
      
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-change-me}@redis:6379/0
      
      TZ: America/Sao_Paulo
    depends_on:
      - db
      - redis
      - backend
    networks:
      - substrato_prod
    restart: always

  # =========================================================================
  # CELERY BEAT
  # =========================================================================
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: substrato_celery_beat_prod
    command: celery -A plataforma beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DJANGO_ENV: production
      DJANGO_SETTINGS_MODULE: plataforma.settings.production
      DJANGO_DEBUG: "False"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      
      # Database
      DB_ENGINE: postgres
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: db
      DB_PORT: "5432"
      
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD:-change-me}@redis:6379/0
      
      TZ: America/Sao_Paulo
    depends_on:
      - db
      - redis
      - backend
    networks:
      - substrato_prod
    restart: always

  # =========================================================================
  # NEXT.JS FRONTEND
  # =========================================================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: substrato_frontend_prod
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NODE_ENV: production
      TZ: America/Sao_Paulo
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - substrato_prod
    restart: always

  # =========================================================================
  # NGINX - REVERSE PROXY & LOAD BALANCER
  # =========================================================================
  nginx:
    image: nginx:alpine
    container_name: substrato_nginx_prod
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-prod.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume_prod:/app/staticfiles:ro
      - media_volume_prod:/app/media:ro
      - ./ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - substrato_prod
    restart: always

  # =========================================================================
  # WATCHTOWER - AUTO UPDATES (optional)
  # =========================================================================
  watchtower:
    image: containrrr/watchtower
    container_name: substrato_watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 3600 --cleanup substrato_backend_prod substrato_frontend_prod
    restart: always

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  postgres_data_prod:
    driver: local
  redis_data_prod:
    driver: local
  static_volume_prod:
    driver: local
  media_volume_prod:
    driver: local

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  substrato_prod:
    driver: bridge
