name: 🚀 Deploy to Staging

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: 'Tag da imagem a publicar (ex.: latest, v1.2.0, sha-abc123)'
        required: true
        default: 'latest'
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
      url: ${{ steps.deploy.outputs.url }}
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 📝 Set environment
      id: env
      run: |
        if [ "${{ inputs.environment }}" = "staging" ]; then
          echo "DEPLOY_ENV=staging" >> $GITHUB_ENV
          echo "DEPLOY_URL=${{ vars.STAGING_URL || 'https://staging.example.com' }}" >> $GITHUB_ENV
        else
          echo "DEPLOY_ENV=production" >> $GITHUB_ENV
          echo "DEPLOY_URL=${{ vars.PRODUCTION_URL || 'https://example.com' }}" >> $GITHUB_ENV
        fi
        echo "IMAGE_TAG=${{ inputs.image_tag }}" >> $GITHUB_ENV
    
    - name: 🔎 Validate deploy secrets
      run: |
        test -n "${{ secrets.AWS_ACCESS_KEY_ID }}"
        test -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}"
        test -n "${{ secrets.AWS_REGION }}"
        test -n "${{ secrets.AWS_ECS_CLUSTER }}"
        test -n "${{ secrets.AWS_ECS_SERVICE_BACKEND }}"
        test -n "${{ secrets.AWS_ECS_SERVICE_FRONTEND }}"
    
    - name: 🔐 Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}
    
    - name: 📦 Deploy backend to ECS
      id: deploy
      run: |
        echo "Deploying backend image tag '${{ env.IMAGE_TAG }}' to ${{ env.DEPLOY_ENV }}..."
        aws ecs update-service \
          --cluster "${{ secrets.AWS_ECS_CLUSTER }}" \
          --service "${{ secrets.AWS_ECS_SERVICE_BACKEND }}" \
          --force-new-deployment

        echo "Deploying frontend image tag '${{ env.IMAGE_TAG }}' to ${{ env.DEPLOY_ENV }}..."
        aws ecs update-service \
          --cluster "${{ secrets.AWS_ECS_CLUSTER }}" \
          --service "${{ secrets.AWS_ECS_SERVICE_FRONTEND }}" \
          --force-new-deployment

        echo "url=${{ env.DEPLOY_URL }}" >> $GITHUB_OUTPUT
    
    - name: 🔔 Send Slack notification
      uses: 8398a7/action-slack@v3
      if: always()
      with:
        status: ${{ job.status }}
        text: 'Deploy (${{ env.DEPLOY_ENV }}) [tag=${{ env.IMAGE_TAG }}] ${{ job.status }}'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        fields: repo,message,commit,author,action,eventName,ref,workflow
      continue-on-error: true
    
    - name: ✅ Deployment Summary
      run: |
        echo "✅ Deployment to ${{ env.DEPLOY_ENV }} completed!"
        echo "📍 URL: ${{ env.DEPLOY_URL }}"
