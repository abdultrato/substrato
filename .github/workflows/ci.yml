name: CI Enterprise Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    name: Backend Quality & Readiness
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: substrato_ci
          POSTGRES_USER: substrato_ci
          POSTGRES_PASSWORD: substrato_ci
        options: >-
          --health-cmd "pg_isready -U substrato_ci -d substrato_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      BACKEND_COVERAGE_MIN: "35"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (Ruff)
        run: |
          ruff check . --output-format=github

      - name: Migration drift gate (model files)
        env:
          DJANGO_SETTINGS_MODULE: platform.settings.development
          DJANGO_SECRET_KEY: test-secret-key
          DB_ENGINE: postgres
          DB_NAME: substrato_ci
          DB_USER: substrato_ci
          DB_PASSWORD: substrato_ci
          DB_HOST: 127.0.0.1
          DB_PORT: "5432"
          REDIS_URL: redis://127.0.0.1:6379/0
        run: |
          python manage.py makemigrations --check --dry-run

      - name: Migration apply gate (database sync)
        env:
          DJANGO_SETTINGS_MODULE: platform.settings.development
          DJANGO_SECRET_KEY: test-secret-key
          DB_ENGINE: postgres
          DB_NAME: substrato_ci
          DB_USER: substrato_ci
          DB_PASSWORD: substrato_ci
          DB_HOST: 127.0.0.1
          DB_PORT: "5432"
          REDIS_URL: redis://127.0.0.1:6379/0
        run: |
          python scripts/migrate_with_lock.py
          python manage.py migrate --check

      - name: Run backend tests with coverage
        env:
          DJANGO_SETTINGS_MODULE: platform.settings.development
          DJANGO_SECRET_KEY: test-secret-key
          DB_ENGINE: postgres
          DB_NAME: substrato_ci
          DB_USER: substrato_ci
          DB_PASSWORD: substrato_ci
          DB_HOST: 127.0.0.1
          DB_PORT: "5432"
          REDIS_URL: redis://127.0.0.1:6379/0
        run: |
          pytest --maxfail=1 --disable-warnings --cov=. --cov-report=term-missing --cov-report=xml --cov-fail-under=${BACKEND_COVERAGE_MIN}

      - name: Production readiness gate
        env:
          DJANGO_SETTINGS_MODULE: platform.settings.production
          DJANGO_DEBUG: "False"
          DJANGO_SECRET_KEY: ci-production-secret-with-64-characters-minimum-1234567890
          DJANGO_ALLOWED_HOSTS: api.example.com
          CORS_ALLOWED_ORIGINS: https://app.example.com
          CSRF_TRUSTED_ORIGINS: https://app.example.com
          USE_REDIS: "true"
          REDIS_URL: redis://127.0.0.1:6379/1
          DB_ENGINE: postgres
          DB_NAME: substrato_ci
          DB_USER: substrato_ci
          DB_PASSWORD: substrato_ci
          DB_HOST: 127.0.0.1
          DB_PORT: "5432"
        run: python scripts/production_readiness_check.py

      - name: Education migration audit gate (strict)
        env:
          DJANGO_SETTINGS_MODULE: platform.settings.development
          DJANGO_SECRET_KEY: test-secret-key
          DB_ENGINE: postgres
          DB_NAME: substrato_ci
          DB_USER: substrato_ci
          DB_PASSWORD: substrato_ci
          DB_HOST: 127.0.0.1
          DB_PORT: "5432"
          REDIS_URL: redis://127.0.0.1:6379/0
        run: |
          python manage.py education_migration_audit --strict --output logs/education-migration-audit-ci.json --output-markdown logs/education-migration-audit-ci.md --format json

      - name: Publish education migration summary
        run: |
          cat logs/education-migration-audit-ci.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-backend
          path: coverage.xml
          if-no-files-found: error

      - name: Upload education migration audit artifact
        uses: actions/upload-artifact@v7
        with:
          name: education-migration-audit-ci-${{ github.run_id }}
          path: |
            logs/education-migration-audit-ci.json
            logs/education-migration-audit-ci.md
          if-no-files-found: error

  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest
    needs: backend-quality
    defaults:
      run:
        working-directory: frontend-next

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-next/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint, type-check, tests and build
        env:
          FRONTEND_COVERAGE_STATEMENTS: "35"
          FRONTEND_COVERAGE_BRANCHES: "25"
          FRONTEND_COVERAGE_FUNCTIONS: "35"
          FRONTEND_COVERAGE_LINES: "35"
        run: |
          npm run lint
          npm run type-check
          npm run test -- --coverage --run
          npm run build

  security:
    name: Security Scans
    runs-on: ubuntu-latest
    needs: backend-quality

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-next/package-lock.json

      - name: Install security tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit pip-audit

      - name: Install frontend dependencies
        working-directory: frontend-next
        run: npm ci

      - name: Run Bandit (SAST)
        run: bandit -q -r apps api application core domain infrastructure security services -x tests

      - name: Run pip-audit (dependency visibility)
        run: pip-audit --progress-spinner off || true

      - name: Run npm audit (production dependencies)
        working-directory: frontend-next
        run: npm audit --omit=dev --audit-level=high

  docker-build-smoke:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    needs: [frontend-quality, security]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          push: false

