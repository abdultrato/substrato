name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run backend tests
        env:
          BACKEND_COVERAGE_MIN: "35"
        run: |
          pytest --maxfail=1 --disable-warnings --cov=. --cov-report=term-missing --cov-fail-under=${BACKEND_COVERAGE_MIN}
      - name: Build backend assets (migrate + collectstatic)
        env:
          DJANGO_SECRET_KEY: dummy
          DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost
          DJANGO_DEBUG: "False"
          DB_ENGINE: sqlite
        run: |
          python manage.py migrate --noinput
          python manage.py collectstatic --noinput

  frontend:
    runs-on: ubuntu-latest
    needs: backend
    defaults:
      run:
        working-directory: frontend-next
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend-next/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Run frontend tests
        env:
          FRONTEND_COVERAGE_STATEMENTS: "35"
          FRONTEND_COVERAGE_BRANCHES: "25"
          FRONTEND_COVERAGE_FUNCTIONS: "35"
          FRONTEND_COVERAGE_LINES: "35"
        run: |
          npm run lint
          npm run type-check
          npm run test -- --coverage --run

  build-and-assets:
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend-next/package-lock.json

      - name: Install frontend deps
        working-directory: frontend-next
        run: npm ci

      - name: Build backend assets (collectstatic, schema)
        env:
          DJANGO_SECRET_KEY: dummy
          DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost
          DJANGO_DEBUG: "False"
          DB_ENGINE: sqlite
        run: |
          python manage.py migrate --noinput
          python manage.py collectstatic --noinput
          make schema || true

      - name: Build frontend
        working-directory: frontend-next
        run: npm run build
