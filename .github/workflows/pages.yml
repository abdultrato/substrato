name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Prepare Pages artifact
        run: |
          set -euo pipefail
          rm -rf .pages-dist
          mkdir -p .pages-dist/static/img
          cp index.html styles.css script.js .pages-dist/
          cp cv-lab-abdultrato.pdf .pages-dist/cv-lab-abdultrato.pdf
          cp static/img/logo.png .pages-dist/static/img/logo.png
          touch .pages-dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: '.pages-dist'

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5

