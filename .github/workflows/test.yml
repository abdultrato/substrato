name: 🧪 Tests & Coverage

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: substrato_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
        cache: 'pip'
    
    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-django pytest-cov coverage[toml]
    
    - name: 🧪 Run Django tests
      env:
        DJANGO_SETTINGS_MODULE: plataforma.settings.development
        DB_ENGINE: postgres
        DB_NAME: substrato_test
        DB_USER: test_user
        DB_PASSWORD: test_password
        DB_HOST: localhost
        DB_PORT: 5432
        REDIS_URL: redis://localhost:6379/0
        DJANGO_SECRET_KEY: test-secret-key
        ALLOWED_HOSTS: localhost,127.0.0.1
      run: |
        python manage.py test --parallel 4 --keepdb
    
    - name: 📊 Run pytest with coverage
      env:
        DJANGO_SETTINGS_MODULE: plataforma.settings.development
        DB_ENGINE: postgres
        DB_NAME: substrato_test
        DB_USER: test_user
        DB_PASSWORD: test_password
        DB_HOST: localhost
        DB_PORT: 5432
        REDIS_URL: redis://localhost:6379/0
        DJANGO_SECRET_KEY: test-secret-key
      run: |
        pytest --cov=. --cov-report=xml --cov-report=term-missing
    
    - name: 📈 Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
      continue-on-error: true
    
    - name: ✅ Test Summary
      if: always()
      run: echo "Tests completed. Check results above."

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: frontend-next
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'frontend-next/package-lock.json'
    
    - name: 📦 Install dependencies
      run: npm ci
    
    - name: 🔨 Build Next.js
      run: npm run build
    
    - name: 🧪 Run linter
      run: npm run lint
    
    - name: ✅ Frontend Summary
      run: echo "Frontend checks completed."
