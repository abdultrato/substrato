[pytest]
DJANGO_SETTINGS_MODULE = plataforma.settings.development
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts = 
    -p no:faker
    --strict-markers
    --tb=short
    --verbose
    --disable-warnings
pythonpath = .
testpaths = .
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
norecursedirs = .git .tox dist build *.egg node_modules staticfiles media tmp* tests/tmp*

[coverage:run]
source = .
omit =
    */tests*
    */test_*.py
    */__pycache__/*
    */migrations/*
    */venv/*
    */virtualenv/*
    */site-packages/*
    manage.py
    setup.py
    conftest.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod
    class .*\bProtocol\):
    @overload
