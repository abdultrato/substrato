events {
    worker_connections 1024;
}

http {

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Avoid leaking nginx version in the `Server` header.
    server_tokens off;

    client_max_body_size 100M;

    gzip on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    # docker DNS (prod compose might still run behind docker networking)
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    # =========================================
    # BACKENDS
    # =========================================

    upstream django_app {
        zone django_app 64k;
        server backend:8000 resolve;
    }

    upstream nextjs_app {
        zone nextjs_app 64k;
        server frontend:3000 resolve;
    }

    # =========================================
    # RATE LIMIT
    # =========================================

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=frontend_limit:10m rate=50r/s;

    # =========================================
    # HTTP → HTTPS
    # =========================================

    server {

        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================
    # HTTPS SERVER
    # =========================================

    server {

        listen 443 ssl http2;
        server_name _;

        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        ssl_protocols TLSv1.2 TLSv1.3;

        client_max_body_size 100M;

        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        # Baseline hardening headers (CSP here is intentionally permissive to avoid breaking Next.js).
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; img-src 'self' data: blob:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' http: https: ws: wss:;" always;

        # -------------------------------------
        # API (Django)
        # -------------------------------------

        location /api/ {

            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://django_app;

            proxy_hide_header X-Powered-By;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 300s;
        }

        # -------------------------------------
        # Django Admin
        # -------------------------------------

        location /admin/ {

            proxy_pass http://django_app;

            proxy_hide_header X-Powered-By;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # -------------------------------------
        # Static files
        # -------------------------------------

        location /static/ {

            alias /app/staticfiles/;

            expires 30d;
            add_header Cache-Control "public, immutable";

            access_log off;
        }

        # -------------------------------------
        # Media files
        # -------------------------------------

        location /media/ {

            alias /app/media/;

            expires 7d;
            add_header Cache-Control "public";

            access_log off;
        }

        # -------------------------------------
        # Frontend (Next.js)
        # -------------------------------------

        location / {

            limit_req zone=frontend_limit burst=100 nodelay;

            proxy_pass http://nextjs_app;

            proxy_hide_header X-Powered-By;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_buffering off;
        }

        # -------------------------------------
        # Health Check
        # -------------------------------------

        location /health {

            access_log off;
            return 200 "healthy\n";

            add_header Content-Type text/plain;
        }
    }
}
