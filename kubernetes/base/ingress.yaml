apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: substrato-ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.seudominio.com
    - app.seudominio.com
    secretName: substrato-tls
  rules:
  - host: api.seudominio.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: substrato-backend
            port:
              number: 80
  - host: app.seudominio.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: substrato-frontend
            port:
              number: 80
