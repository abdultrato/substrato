apiVersion: apps/v1
kind: Deployment
metadata:
  name: substrato-backend
  labels:
    app: substrato
    component: backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: substrato
      component: backend
  template:
    metadata:
      labels:
        app: substrato
        component: backend
    spec:
      serviceAccountName: substrato
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: backend
        image: ghcr.io/seu-usuario/substrato/backend:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        env:
        - name: DJANGO_ENV
          value: "production"
        - name: DJANGO_SETTINGS_MODULE
          value: "platform.settings.production"
        - name: DJANGO_DEBUG
          value: "False"
        - name: DJANGO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: substrato-secrets
              key: django-secret-key
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: substrato-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: substrato-secrets
              key: redis-url
        - name: USE_REDIS
          value: "true"
        - name: CELERY_WORKER_QUEUES
          value: "default,exports,billing,operations"
        - name: DJANGO_ALLOWED_HOSTS
          valueFrom:
            configMapKeyRef:
              name: substrato-config
              key: allowed-hosts
        - name: CORS_ALLOWED_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: substrato-config
              key: cors-origins
        livenessProbe:
          httpGet:
            path: /health/live
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /app/staticfiles
      volumes:
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - substrato
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: substrato-backend
  labels:
    app: substrato
    component: backend
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
  selector:
    app: substrato
    component: backend
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: substrato-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: substrato-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: substrato-celery-beat
  labels:
    app: substrato
    component: celery-beat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: substrato
      component: celery-beat
  template:
    metadata:
      labels:
        app: substrato
        component: celery-beat
    spec:
      serviceAccountName: substrato
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: celery-beat
        image: ghcr.io/seu-usuario/substrato/backend:latest
        imagePullPolicy: Always
        args:
        - celery
        - -A
        - platform
        - beat
        - -l
        - info
        - --scheduler
        - django_celery_beat.schedulers:DatabaseScheduler
        env:
        - name: DJANGO_ENV
          value: "production"
        - name: DJANGO_SETTINGS_MODULE
          value: "platform.settings.production"
        - name: DJANGO_DEBUG
          value: "False"
        - name: DJANGO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: substrato-secrets
              key: django-secret-key
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: substrato-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: substrato-secrets
              key: redis-url
        - name: USE_REDIS
          value: "true"
        - name: CELERY_WORKER_QUEUES
          value: "default,exports,billing,operations"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: substrato-celery-worker
  labels:
    app: substrato
    component: celery-worker
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: substrato
      component: celery-worker
  template:
    metadata:
      labels:
        app: substrato
        component: celery-worker
    spec:
      serviceAccountName: substrato
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: celery-worker
        image: ghcr.io/seu-usuario/substrato/backend:latest
        imagePullPolicy: Always
        args:
        - celery
        - -A
        - platform
        - worker
        - -l
        - info
        - -Q
        - default,exports,billing,operations
        - --concurrency=2
        - --max-tasks-per-child=100
        env:
        - name: DJANGO_ENV
          value: "production"
        - name: DJANGO_SETTINGS_MODULE
          value: "platform.settings.production"
        - name: DJANGO_DEBUG
          value: "False"
        - name: DJANGO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: substrato-secrets
              key: django-secret-key
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: substrato-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: substrato-secrets
              key: redis-url
        - name: USE_REDIS
          value: "true"
        - name: CELERY_WORKER_QUEUES
          value: "default,exports,billing,operations"
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: substrato-celery-worker-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: substrato-celery-worker
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
