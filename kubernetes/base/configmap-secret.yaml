apiVersion: v1
kind: ConfigMap
metadata:
  name: substrato-config
data:
  allowed-hosts: "api.seudominio.com,app.seudominio.com"
  cors-origins: "https://app.seudominio.com"
  postgres-db: "substrato_db"
  log-level: "INFO"
---
apiVersion: v1
kind: Secret
metadata:
  name: substrato-secrets
type: Opaque
stringData:
  django-secret-key: "CHANGE-ME-IN-PRODUCTION"
  postgres-user: "substrato_user"
  postgres-password: "CHANGE-ME-IN-PRODUCTION"
  database-url: "postgresql://substrato_user:CHANGE-ME@postgres:5432/substrato_db"
  redis-url: "redis://redis:6379/0"
  jwt-secret: "CHANGE-ME-IN-PRODUCTION"
